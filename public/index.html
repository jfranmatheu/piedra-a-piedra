<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Piedra a Piedra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="glow-orb glow-a" aria-hidden="true"></div>
  <div class="glow-orb glow-b" aria-hidden="true"></div>

  <div id="app">
    <!-- loading -->
    <div id="boot" class="boot">
      <div class="boot-stone">🪨</div>
      <p class="boot-text">Tallando el modelo…</p>
    </div>
  </div>

  <!-- lightbox -->
  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox-close" type="button" aria-label="Cerrar">×</button>
    <img id="lightbox-img" alt="" />
  </div>

  <!-- toast -->
  <div id="toasts" class="toasts" aria-live="polite"></div>

  <!-- confetti canvas -->
  <canvas id="confetti" class="confetti" aria-hidden="true"></canvas>

  <script src="/js/app.js" type="module"></script>
</body>
</html>
